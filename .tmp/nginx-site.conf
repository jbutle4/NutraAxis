# NutraAxis custom nginx site config for Azure App Service Linux (PHP 8.x).
# Deployed to /home/site/nginx-site.conf and applied via /home/site/startup.sh

server {
    listen 8080;
    listen [::]:8080;
    root /home/site/wwwroot;
    index index.php index.html index.htm hostingstart.html;
    server_name nutraaxisweb.azurewebsites.net www.nutraaxisweb.azurewebsites.net;

    # Avoid http:// and :8080 in directory slash redirects behind Azure's HTTPS front-end.
    port_in_redirect off;
    absolute_redirect off;

    location / {
        index index.php index.html index.htm hostingstart.html;
        try_files $uri $uri/ /index.php?$args;
    }

    location = /.env {
        deny all;
        return 404;
    }

    location = /.env.example {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.[Pp][Hh][Pp])(|/.*)$;
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;
        fastcgi_intercept_errors on;
        send_timeout 3600;
        fastcgi_read_timeout 3600;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /html/;
    }
}
