<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
<title id="title">NutraAxis science engine</title><desc id="desc">Biomarker signals flow through mechanism mapping into therapy stack design and provider workflow.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F7FBFA"/><stop offset="1" stop-color="#FAF8F3"/></linearGradient>
  <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#18383A" flood-opacity="0.12"/></filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#4A9B9B"/></marker>
  <style>.h{font:800 60px Inter,Arial,sans-serif; fill:#243746}.sub{font:400 24px Inter,Arial,sans-serif; fill:#5C6B73}.label{font:800 26px Inter,Arial,sans-serif; fill:#243746}.num{font:800 22px Inter,Arial,sans-serif; fill:#FF8A65}.pill{font:700 22px Inter,Arial,sans-serif; fill:white}</style>
</defs>
<rect width="1440" height="760" rx="34" fill="url(#bg)"/>
<text x="84" y="104" class="h">Science organized around the care plan</text>
<text x="86" y="148" class="sub">NutraAxis turns measurements into mechanism-led support that practitioners can explain and patients can follow.</text>
<g transform="translate(140 210)">
  <rect width="1160" height="130" rx="32" fill="#243746"/>
  <text x="46" y="78" class="pill">MEASURE</text>
  <path d="M190 65 H350" stroke="#FF8A65" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="388" y="78" class="pill">MATCH MECHANISM</text>
  <path d="M642 65 H780" stroke="#FF8A65" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="818" y="78" class="pill">BUILD STACK</text>
  <path d="M988 65 H1088" stroke="#FF8A65" stroke-width="5" marker-end="url(#arrow)"/>
  <circle cx="1118" cy="65" r="18" fill="#FF8A65"/><text x="1112" y="72" style="font:900 20px Inter,Arial; fill:white;">✓</text>
</g>
<g transform="translate(90 420)"><rect width="290" height="190" rx="24" fill="white" filter="url(#shadow)"/><rect width="8" height="118" x="28" y="44" rx="4" fill="#4A9B9B"/><text x="52" y="54" class="num">01</text><text x="52" y="92" class="label">Biomarker signals</text><foreignObject x="52" y="110" width="205" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Inter,Arial,sans-serif;color:#5C6B73;line-height:1.35">Hormones, lipids, inflammation, metabolism and stress markers</div></foreignObject></g><g transform="translate(415 420)"><rect width="290" height="190" rx="24" fill="white" filter="url(#shadow)"/><rect width="8" height="118" x="28" y="44" rx="4" fill="#D4A574"/><text x="52" y="54" class="num">02</text><text x="52" y="92" class="label">Mechanism mapping</text><foreignObject x="52" y="110" width="205" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Inter,Arial,sans-serif;color:#5C6B73;line-height:1.35">Match nutritional levers to the biological system being supported</div></foreignObject></g><g transform="translate(740 420)"><rect width="290" height="190" rx="24" fill="white" filter="url(#shadow)"/><rect width="8" height="118" x="28" y="44" rx="4" fill="#9B8FB9"/><text x="52" y="54" class="num">03</text><text x="52" y="92" class="label">Therapy-stack design</text><foreignObject x="52" y="110" width="205" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Inter,Arial,sans-serif;color:#5C6B73;line-height:1.35">Layer complementary SKUs by protocol, not by trend</div></foreignObject></g><g transform="translate(1065 420)"><rect width="290" height="190" rx="24" fill="white" filter="url(#shadow)"/><rect width="8" height="118" x="28" y="44" rx="4" fill="#7EC4A3"/><text x="52" y="54" class="num">04</text><text x="52" y="92" class="label">Provider workflow</text><foreignObject x="52" y="110" width="205" height="70"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Inter,Arial,sans-serif;color:#5C6B73;line-height:1.35">Results and recommendations stay connected to the care plan</div></foreignObject></g>
<path d="M230 378 C435 310, 610 310, 775 378" fill="none" stroke="#4A9B9B" stroke-width="4" opacity="0.28"/>
<path d="M690 378 C880 320, 1035 320, 1190 378" fill="none" stroke="#4A9B9B" stroke-width="4" opacity="0.28"/>
</svg>
