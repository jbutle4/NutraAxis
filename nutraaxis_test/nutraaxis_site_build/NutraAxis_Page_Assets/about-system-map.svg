<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
<title id="title">NutraAxis closed-loop precision health system</title>
<desc id="desc">Five connected pillars: Test, Formulate, Deliver, Dispense, Manage.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FAF8F3"/><stop offset="1" stop-color="#EEF7F6"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#18383A" flood-opacity="0.12"/></filter>
  <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#4A9B9B"/></marker>
  <style>
    .h{font:700 58px Inter, Arial, sans-serif; fill:#243746}
    .sub{font:400 25px Inter, Arial, sans-serif; fill:#5C6B73}
    .label{font:800 29px Inter, Arial, sans-serif; fill:#243746}
    .small{font:400 19px Inter, Arial, sans-serif; fill:#5C6B73}
    .num{font:800 24px Inter, Arial, sans-serif; fill:#FF8A65}
  </style>
</defs>
<rect width="1440" height="760" rx="34" fill="url(#bg)"/>
<circle cx="1190" cy="140" r="190" fill="#4A9B9B" opacity="0.07"/>
<circle cx="190" cy="640" r="160" fill="#FF8A65" opacity="0.08"/>
<text x="86" y="96" class="h">A closed loop for precision health</text>
<text x="88" y="140" class="sub">Built to connect what the patient measures, what the provider recommends, and what the patient actually takes.</text>
<path d="M305 367 C390 215, 585 160, 725 222 C865 284, 929 458, 840 584 C748 714, 553 724, 422 627 C296 533, 237 487, 305 367" fill="none" stroke="#4A9B9B" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 18" opacity="0.45" marker-end="url(#arrow)"/>
<g filter="url(#shadow)">
  <g transform="translate(154 262)"><rect width="226" height="168" rx="24" fill="white"/><text x="24" y="34" class="num">01</text><text x="24" y="75" class="label">TEST</text><text x="24" y="111" class="small">At-home panels</text><text x="24" y="137" class="small">biomarkers &amp; inputs</text></g>
  <g transform="translate(424 155)"><rect width="246" height="172" rx="24" fill="white"/><text x="24" y="34" class="num">02</text><text x="24" y="75" class="label">FORMULATE</text><text x="24" y="111" class="small">Therapy-stack</text><text x="24" y="137" class="small">nutritional support</text></g>
  <g transform="translate(760 214)"><rect width="226" height="168" rx="24" fill="white"/><text x="24" y="34" class="num">03</text><text x="24" y="75" class="label">DELIVER</text><text x="24" y="111" class="small">Bottles or premium</text><text x="24" y="137" class="small">daily packets</text></g>
  <g transform="translate(744 512)"><rect width="242" height="168" rx="24" fill="white"/><text x="24" y="34" class="num">04</text><text x="24" y="75" class="label">DISPENSE</text><text x="24" y="111" class="small">Provider-operated</text><text x="24" y="137" class="small">Clinic Stores</text></g>
  <g transform="translate(392 500)"><rect width="236" height="168" rx="24" fill="white"/><text x="24" y="34" class="num">05</text><text x="24" y="75" class="label">MANAGE</text><text x="24" y="111" class="small">Protocol reviews</text><text x="24" y="137" class="small">over time</text></g>
</g>
<g transform="translate(1110 410)">
  <rect width="248" height="210" rx="28" fill="#243746" opacity="0.95"/>
  <text x="28" y="52" style="font:800 27px Inter,Arial,sans-serif; fill:white;">The method</text>
  <text x="28" y="94" style="font:500 22px Inter,Arial,sans-serif; fill:#DDF1EF;">Test.</text>
  <text x="28" y="130" style="font:500 22px Inter,Arial,sans-serif; fill:#DDF1EF;">Formulate.</text>
  <text x="28" y="166" style="font:500 22px Inter,Arial,sans-serif; fill:#DDF1EF;">Deliver.</text>
  <path d="M28 184 H212" stroke="#FF8A65" stroke-width="6" stroke-linecap="round"/>
</g>
</svg>
